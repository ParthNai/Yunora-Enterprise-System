kind = "web"
previewPath = "/"
title = "Yunora Admin Panel"
version = "1.0.0"
id = "artifacts/yunora-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25736

[services.development]
run = "pnpm --filter @workspace/yunora-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yunora-admin", "run", "build" ]
publicDir = "artifacts/yunora-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25736"
BASE_PATH = "/"
